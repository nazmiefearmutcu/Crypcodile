<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" role="img" aria-labelledby="title desc">
  <title id="title">Crypcodile logo</title>
  <desc id="desc">Square rounded-tile icon with a teal-to-green gradient background and a minimal centered crocodile-eye mark in translucent white: an almond-shaped lid with a solid pupil ring, flanked by a small row of triangular scales.</desc>

  <defs>
    <linearGradient id="crocGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="crocFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B3B36" stop-opacity="0"/>
      <stop offset="1" stop-color="#0B3B36" stop-opacity="0.20"/>
    </linearGradient>
  </defs>

  <!-- Tile background -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#crocGrad)"/>
  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#crocFade)"/>

  <!-- Crocodile-eye mark, centered -->
  <g transform="translate(128 124)">
    <!-- Almond eye outline -->
    <path d="M-66 0 q66 -52 132 0 q-66 52 -132 0 z" fill="#FFFFFF" fill-opacity="0.18"/>
    <!-- Iris ring -->
    <circle cx="0" cy="0" r="32" fill="#FFFFFF" fill-opacity="0.30"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="15" fill="#FFFFFF"/>
    <!-- Highlight -->
    <circle cx="-7" cy="-7" r="5" fill="#ECFDF5" fill-opacity="0.85"/>
  </g>

  <!-- Row of triangular scales below the eye -->
  <g transform="translate(128 196)" fill="#FFFFFF" fill-opacity="0.22">
    <path d="M-54 0 l18 -22 l18 22 z"/>
    <path d="M-18 0 l18 -22 l18 22 z"/>
    <path d="M18 0 l18 -22 l18 22 z"/>
  </g>
</svg>
