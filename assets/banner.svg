<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="100%" role="img" aria-labelledby="title desc">
  <title id="title">Crypcodile — Open-source crypto market-data engine</title>
  <desc id="desc">Wide hero banner with a teal-to-green gradient background, the bold white "Crypcodile" wordmark, a tagline, a sub-tagline, four feature chips (ingest, normalize, store, retrieve), and a subtle row of triangular crocodile scales as decorative texture along the lower edge.</desc>

  <defs>
    <linearGradient id="crocGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="crocFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B3B36" stop-opacity="0"/>
      <stop offset="1" stop-color="#0B3B36" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <!-- Banner background: rounded rect filling the viewBox -->
  <rect x="0" y="0" width="1280" height="360" rx="28" fill="url(#crocGrad)"/>
  <rect x="0" y="0" width="1280" height="360" rx="28" fill="url(#crocFade)"/>

  <!-- Decorative scale/teeth row along the lower edge (subtle texture) -->
  <g fill="#FFFFFF" fill-opacity="0.12">
    <path d="M64 300 l28 -44 l28 44 z"/>
    <path d="M120 300 l28 -44 l28 44 z"/>
    <path d="M176 300 l28 -44 l28 44 z"/>
    <path d="M232 300 l28 -44 l28 44 z"/>
    <path d="M288 300 l28 -44 l28 44 z"/>
    <path d="M344 300 l28 -44 l28 44 z"/>
    <path d="M400 300 l28 -44 l28 44 z"/>
  </g>

  <!-- Subtle geometric croc-eye mark, top-right corner -->
  <g transform="translate(1140 96)" fill="#FFFFFF">
    <path d="M-56 0 q56 -40 112 0 q-56 40 -112 0 z" fill-opacity="0.14"/>
    <circle cx="0" cy="0" r="20" fill-opacity="0.20"/>
    <circle cx="0" cy="0" r="9" fill-opacity="0.55"/>
  </g>

  <!-- Wordmark -->
  <text x="72" y="150"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="92" font-weight="800" fill="#FFFFFF" letter-spacing="-1">Crypcodile</text>

  <!-- Tagline -->
  <text x="74" y="200"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="30" font-weight="600" fill="#ECFDF5" fill-opacity="0.95">Open-source crypto market-data engine</text>

  <!-- Sub-tagline -->
  <text x="74" y="234"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="20" font-weight="400" fill="#ECFDF5" fill-opacity="0.88">ingest · normalize · store · retrieve — anywhere, at any resolution</text>

  <!-- Feature chips -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
     font-size="20" font-weight="600" fill="#FFFFFF">
    <g>
      <rect x="74" y="280" width="118" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.16"/>
      <text x="133" y="308" text-anchor="middle" dominant-baseline="middle">ingest</text>
    </g>
    <g>
      <rect x="204" y="280" width="150" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.16"/>
      <text x="279" y="308" text-anchor="middle" dominant-baseline="middle">normalize</text>
    </g>
    <g>
      <rect x="366" y="280" width="110" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.16"/>
      <text x="421" y="308" text-anchor="middle" dominant-baseline="middle">store</text>
    </g>
    <g>
      <rect x="488" y="280" width="128" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.16"/>
      <text x="552" y="308" text-anchor="middle" dominant-baseline="middle">retrieve</text>
    </g>
  </g>
</svg>
